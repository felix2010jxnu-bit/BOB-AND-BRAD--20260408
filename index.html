<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>亚马逊运营绩效系统（最终版·主管可看组员）</title>
<style>
:root{--primary:#232f3e;--accent:#ff9900;--bg:#f4f6f8;--border:#ddd}
body{font-family:Microsoft YaHei, sans-serif; background:var(--bg); margin:0; padding:20px; font-size:14px}
.container{max-width:1200px; margin:auto; background:#fff; padding:25px; border-radius:12px}
.login-box{max-width:400px; margin:80px auto; padding:30px; background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.1)}
.login-box input, .login-box button{width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ddd}
button{cursor:pointer}
.btn-primary{background:var(--accent); color:#fff; border:none}
.btn-secondary{background:#0d6efd; color:#fff; border:none}
.user-info{display:flex; justify-content:space-between; padding:12px 16px; background:#f8f9fa; border-radius:8px; margin-bottom:16px}
.nav-bar{display:flex; gap:12px; margin-bottom:20px}
.nav-btn{padding:8px 16px; border:1px solid #ddd; border-radius:6px}
.nav-btn.active{background:#0d6efd; color:#fff}
.section{border:1px solid var(--border); border-radius:8px; margin-bottom:20px}
.section-header{background:var(--primary); color:#fff; padding:12px 16px; font-weight:bold}
.row{display:flex; border-bottom:1px solid var(--border); padding:10px}
.col-metric{width:180px; font-weight:bold; padding-right:10px}
.col-content{flex:1; padding-right:10px}
.col-score{width:80px}
textarea{width:100%; height:60px; box-sizing:border-box}
input[type="number"]{width:100%; box-sizing:border-box}
.page{display:none}
.page.active{display:block}
.member-list{margin-top:16px; max-height:300px; overflow:auto}
.member-item{padding:10px; border-bottom:1px solid #eee}
.staff-only{display:none}
.leader-only{display:none}
.manager-only{display:none}
</style>
</head>
<body>

<div id="loginPage" class="page active">
  <div class="login-box">
    <h3>绩效系统登录</h3>
    <input id="loginUser" placeholder="姓名">
    <input id="loginPwd" type="password" placeholder="密码：flige5401">
    <button class="btn-primary" onclick="login()">登录</button>
    <button class="btn-secondary" onclick="showResetPwd()">修改密码</button>
  </div>
</div>

<div id="resetPwdPage" class="page">
  <div class="login-box">
    <h3>修改密码</h3>
    <input id="rpUser" disabled>
    <input id="rpOld" placeholder="原密码">
    <input id="rpNew" placeholder="新密码">
    <button class="btn-primary" onclick="doResetPwd()">确认修改</button>
    <button onclick="backToLogin()">返回</button>
  </div>
</div>

<div id="mainPage" class="page">
  <div class="container">
    <div class="user-info">
      <div><span id="showName"></span>｜<span id="showRole"></span>｜组：<span id="showGroup"></span></div>
      <div><button onclick="logout()">退出</button></div>
    </div>

    <div class="nav-bar">
      <button class="nav-btn" onclick="showTab('self')">我的绩效</button>
      <button class="nav-btn leader-only manager-only" onclick="showTab('team')">本组专员</button>
      <button class="nav-btn manager-only" onclick="showTab('manage')">人员管理</button>
    </div>

    <div id="tab_self" class="page">
      <div class="section staff-only leader-only">
        <div class="section-header">一、业绩目标（20分）</div>
        <div class="row">
          <div class="col-metric">销售额完成率（10）</div>
          <div class="col-content"><textarea id="p1_1"></textarea></div>
          <div class="col-score"><input type="number" id="s1_1" max="10"></div>
        </div>
        <div class="row">
          <div class="col-metric">利润率（10）</div>
          <div class="col-content"><textarea id="p1_2"></textarea></div>
          <div class="col-score"><input type="number" id="s1_2" max="10"></div>
        </div>
      </div>

      <div class="section staff-only leader-only">
        <div class="section-header">二、主动性与优化（30分）</div>
        <div class="row">
          <div class="col-metric">工作主动性（12）</div>
          <div class="col-content"><textarea id="p2_1"></textarea></div>
          <div class="col-score"><input type="number" id="s2_1" max="12"></div>
        </div>
        <div class="row">
          <div class="col-metric">问题解决（12）</div>
          <div class="col-content"><textarea id="p2_2"></textarea></div>
          <div class="col-score"><input type="number" id="s2_2" max="12"></div>
        </div>
        <div class="row">
          <div class="col-metric">优化建议（6）</div>
          <div class="col-content"><textarea id="p2_3"></textarea></div>
          <div class="col-score"><input type="number" id="s2_3" max="6"></div>
        </div>
      </div>

      <div class="section staff-only">
        <div class="section-header">三、日常运营（50分）——专员专属</div>
        <div class="row">
          <div class="col-metric">Listing维护（20）</div>
          <div class="col-content"><textarea id="p3_1"></textarea></div>
          <div class="col-score"><input type="number" id="s3_1" max="20"></div>
        </div>
        <div class="row">
          <div class="col-metric">广告优化（15）</div>
          <div class="col-content"><textarea id="p3_2"></textarea></div>
          <div class="col-score"><input type="number" id="s3_2" max="15"></div>
        </div>
        <div class="row">
          <div class="col-metric">库存管理（15）</div>
          <div class="col-content"><textarea id="p3_3"></textarea></div>
          <div class="col-score"><input type="number" id="s3_3" max="15"></div>
        </div>
      </div>

      <div class="section leader-only">
        <div class="section-header">四、团队管理（45分）——主管专属</div>
        <div class="row">
          <div class="col-metric">库存健康（15）</div>
          <div class="col-content"><textarea id="p4_1"></textarea></div>
          <div class="col-score"><input type="number" id="s4_1" max="15"></div>
        </div>
        <div class="row">
          <div class="col-metric">人才培养（15）</div>
          <div class="col-content"><textarea id="p4_2"></textarea></div>
          <div class="col-score"><input type="number" id="s4_2" max="15"></div>
        </div>
        <div class="row">
          <div class="col-metric">体系风控（15）</div>
          <div class="col-content"><textarea id="p4_3"></textarea></div>
          <div class="col-score"><input type="number" id="s4_3" max="15"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">五、加减分项</div>
        <div class="row">
          <div class="col-metric">加分（上限10）</div>
          <div class="col-content"><textarea id="p5_1"></textarea></div>
          <div class="col-score"><input type="number" id="s5_1" max="10"></div>
        </div>
        <div class="row">
          <div class="col-metric">扣分</div>
          <div class="col-content"><textarea id="p5_2"></textarea></div>
          <div class="col-score"><input type="number" id="s5_2"></div>
        </div>
      </div>

      <div style="text-align:right; font-size:18px; font-weight:bold">
        总分：<span id="total">0</span>｜等级：<span id="level">D</span>
      </div>
    </div>

    <div id="tab_team" class="page">
      <h3>本组运营专员</h3>
      <div id="teamList"></div>
    </div>

    <div id="tab_manage" class="page">
      <h3>人员管理</h3>
      <div>
        <input id="addName" placeholder="姓名" style="padding:8px; width:120px">
        <select id="addRole" style="padding:8px">
          <option value="staff">专员</option>
          <option value="leader">主管</option>
        </select>
        <input id="addGroup" placeholder="组名" style="padding:8px; width:120px">
        <button onclick="addUser()" class="btn-primary">添加</button>
      </div>
      <div class="member-list" id="allUserList"></div>
    </div>
  </div>
</div>

<script>
// 存储
function saveUsers(d){localStorage.setItem('perf_users',JSON.stringify(d))}
function loadUsers(){
  let d=localStorage.getItem('perf_users')
  if(d)return JSON.parse(d)
  return {经理:{role:'manager',pwd:'flige5401',group:'总管理'}}
}
let users=loadUsers()
let cur=null
let editUser=null

function $(id){return document.getElementById(id)}

function showTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'))
  $('tab_'+t).classList.add('active')
  document.querySelector(`.nav-btn[onclick="showTab('${t}')"]`).classList.add('active')
  if(t==='team')loadTeam()
  if(t==='manage')loadManage()
}

function login(){
  let u=$('loginUser').value.trim()
  let p=$('loginPwd').value.trim()
  users=loadUsers()
  if(!users[u]||users[u].pwd!==p){alert('账号或密码错误');return}
  cur={name:u,...users[u]}
  $('loginPage').classList.remove('active')
  $('mainPage').classList.add('active')
  $('showName').innerText=cur.name
  $('showGroup').innerText=cur.group
  $('showRole').innerText=({manager:'经理',leader:'主管',staff:'专员'})[cur.role]
  if(cur.role==='staff'){
    document.querySelectorAll('.staff-only').forEach(x=>x.style.display='block')
    document.querySelectorAll('.leader-only').forEach(x=>x.style.display='none')
    document.querySelectorAll('.manager-only').forEach(x=>x.style.display='none')
  }else if(cur.role==='leader'){
    document.querySelectorAll('.staff-only').forEach(x=>x.style.display='none')
    document.querySelectorAll('.leader-only').forEach(x=>x.style.display='block')
    document.querySelectorAll('.manager-only').forEach(x=>x.style.display='none')
  }else{
    document.querySelectorAll('.staff-only,.leader-only,.manager-only').forEach(x=>x.style.display='block')
  }
  showTab('self')
  calc()
}

function logout(){cur=null;$('mainPage').classList.remove('active');$('loginPage').classList.add('active')}
function showResetPwd(){$('loginPage').classList.remove('active');$('resetPwdPage').classList.add('active');$('rpUser').value=cur?.name||''}
function backToLogin(){$('resetPwdPage').classList.remove('active');$('loginPage').classList.add('active')}
function doResetPwd(){
  if(!cur)return
  let old=$('rpOld').value, nw=$('rpNew').value
  if(users[cur.name].pwd!==old){alert('原密码错')}else{users[cur.name].pwd=nw;saveUsers(users);alert('成功');backToLogin()}
}

function loadTeam(){
  let html='', g=cur.group
  for(let u in users){
    if(users[u].role==='staff'&&users[u].group===g){
      html+=`<div class="member-item"><button onclick="viewStaff('${u}')">查看/编辑</button> ${u}</div>`
    }
  }
  $('teamList').innerHTML=html
}

function viewStaff(u){
  editUser=u
  showTab('self')
  calc()
}

function loadManage(){
  let html=''
  for(let u in users){
    if(u==='经理')continue
    html+=`<div class="member-item">${u}｜${users[u].role==='leader'?'主管':'专员'}｜${users[u].group} 
<button onclick="delUser('${u}')">删除</button></div>`
  }
  $('allUserList').innerHTML=html
}

function addUser(){
  let n=$('addName').value.trim(), r=$('addRole').value, g=$('addGroup').value.trim()
  if(!n||users[n]){alert('姓名重复或为空');return}
  users[n]={role:r,pwd:'flige5401',group:g||'未分组'}
  saveUsers(users);loadManage();alert('添加成功')
}

function delUser(u){if(confirm('删除？')){delete users[u];saveUsers(users);loadManage()}}

function calc(){
  let t=0, target=editUser||cur.name
  let su=users[target]
  function val(id){return Number($(id).value)||0}
  if(su.role==='staff'){
    t=val('s1_1')+val('s1_2')+val('s2_1')+val('s2_2')+val('s2_3')+val('s3_1')+val('s3_2')+val('s3_3')+val('s5_1')-val('s5_2')
  }else{
    t=val('s1_1')+val('s1_2')+val('s2_1')+val('s2_2')+val('s2_3')+val('s4_1')+val('s4_2')+val('s4_3')+val('s5_1')-val('s5_2')
  }
  $('total').innerText=t
  let lv='D';if(t>=95)lv='S';else if(t>=85)lv='A';else if(t>=75)lv='B';else if(t>=60)lv='C'
  $('level').innerText=lv
}

document.querySelectorAll('input,textarea').forEach(i=>i.oninput=calc)
</script>
</body>
</html>
